<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #b08968;
            --bg: #f8f5f2;
            --card: #ffffff;
            --text-main: #2c2c2c;
            --text-muted: #8a817c;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text-main);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: transparent;
        }

        .nav h2 {
            margin: 0;
            font-size: 32px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
        }

        .nav button {
            border: none;
            background: #ddd;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .section {
            padding: 10px 40px 40px;
        }

        .form-card {
            background: var(--card);
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .form-card h3 {
            margin-top: 0;
            font-size: 22px;
        }

        .form-row {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-row input,
        .form-row select {
            padding: 14px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            min-width: 180px;
            font-family: 'Poppins', sans-serif;
        }

        .form-row button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 14px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 20px;
        }

        .card p {
            margin: 8px 0;
            font-size: 16px;
        }

        .type {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 6px;
            background: #eee;
        }

        .btn-delete {
            margin-top: 14px;
            padding: 10px 14px;
            border: none;
            background: var(--danger);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .empty {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<nav class="nav">
    <h2>Admin Panel</h2>
    <div class="nav-right">
        <a href="index.html">Home</a>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<div class="section">
    <div class="form-card">
        <h3>Add New Item</h3>

        <div class="form-row">
            <input type="text" id="name" placeholder="Item name">
            <input type="text" id="location" placeholder="Location">

            <select id="type">
                <option value="lost">Lost</option>
                <option value="found">Found</option>
            </select>

            <input type="text" id="image" placeholder="Image URL (optional)">

            <button onclick="addItem()">Add Item</button>
        </div>
    </div>

    <div class="grid" id="adminGrid"></div>
</div>

<script>
    if (!localStorage.getItem("admin")) {
        alert("Access denied!");
        window.location.href = "admin-login.html";
    }

    async function addItem() {
        const name = document.getElementById('name').value.trim();
        const location = document.getElementById('location').value.trim();
        const type = document.getElementById('type').value;
        const image = document.getElementById('image').value.trim();

        if (!name || !location || !type) {
            alert("Please fill all required fields.");
            return;
        }

        try {
            const res = await fetch('/api/items', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, location, type, image })
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.error || "Failed to add item.");
                return;
            }

            alert("Item added successfully!");

            document.getElementById('name').value = "";
            document.getElementById('location').value = "";
            document.getElementById('type').value = "lost";
            document.getElementById('image').value = "";

            loadAdminItems();
        } catch (error) {
            console.error(error);
            alert("Something went wrong while adding the item.");
        }
    }

    async function loadAdminItems() {
        try {
            const res = await fetch('/api/items');
            const items = await res.json();

            const grid = document.getElementById('adminGrid');

            if (!items.length) {
                grid.innerHTML = '<div class="empty">No items added yet.</div>';
                return;
            }

            grid.innerHTML = items.map(item => `
    <div class="card">
        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : ""}
        <h3>${item.name}</h3>
        <p>📍 ${item.location}</p>
        <p>📧 ${item.email || "Not provided"}</p>
        <p>Type: ${item.type}</p>
        <p>Status: <strong>${item.status || "Available"}</strong></p>

        <button onclick="markReturned(${item.id})" style="margin-right:10px; padding:10px; border:none; background:#b08968; color:white; border-radius:8px; cursor:pointer;">
            Mark as Returned
        </button>

        <button onclick="deleteItem(${item.id})" class="btn-delete">
            Delete Item
        </button>
    </div>
`).join(''); 

        } catch (error) {
            console.error(error);
            document.getElementById('adminGrid').innerHTML =
                '<div class="empty">Failed to load items.</div>';
        }
    }
    async function markReturned(id) {
    const res = await fetch(`/api/items/${id}/return`, {
        method: "PUT"
    });

    const data = await res.json();

    if (res.ok) {
        alert("Item marked as returned!");
        loadAdminItems();
    } else {
        alert(data.error || "Failed to update status.");
    }
}
    async function deleteItem(id) {
        if (!confirm("Delete this item?")) return;

        try {
            const res = await fetch(`/api/items/${id}`, {
                method: 'DELETE'
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.error || "Failed to delete item.");
                return;
            }

            loadAdminItems();
        } catch (error) {
            console.error(error);
            alert("Something went wrong while deleting.");
        }
    }

    function logout() {
        localStorage.removeItem("admin");
        window.location.href = "index.html";
    }

    window.onload = loadAdminItems;
</script>

</body>
</html>
