<!DOCTYPE html>
<html>
<head>
    <title>Inventory - Findora</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #b08968;
            --bg: #f8f5f2;
            --card: #ffffff;
            --text-main: #2c2c2c;
            --text-muted: #8a817c;
            --border: #e6dfda;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text-main);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 26px 50px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 3px;
        }

        .links {
            display: flex;
            gap: 14px;
        }

        .links a {
            text-decoration: none;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 22px;
            border-radius: 999px;
            font-weight: 500;
        }

        .links a.active {
            background: var(--primary);
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: center;
            padding: 20px 20px 10px;
        }

        .search-box {
            width: 100%;
            max-width: 380px;
            padding: 14px 18px;
            border: 1px solid #d8d1cb;
            border-radius: 999px;
            outline: none;
            font-size: 15px;
            background: white;
            font-family: 'Poppins', sans-serif;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 320px));
            gap: 24px;
            justify-content: center;
            padding: 40px;
        }

        .card {
            background: var(--card);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .no-image {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1ece8;
            color: var(--text-muted);
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        .card-content {
            padding: 18px 18px 20px;
        }

        .card h3 {
            margin: 0 0 12px;
            font-size: 20px;
        }

        .card p {
            margin: 8px 0;
            color: var(--text-muted);
            font-size: 16px;
        }

        .badge {
            display: inline-block;
            margin-top: 12px;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .badge.lost {
            background: #fde2de;
            color: #d94841;
        }

        .badge.found {
            background: #dff4e4;
            color: #2e8b57;
        }

        .empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 18px;
            grid-column: 1 / -1;
        }

        .card a {
            color: var(--primary);
            text-decoration: none;
        }

        .card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="logo">🔎 Findora</div>
        <div class="links">
            <a href="index.html">HOME</a>
            <a href="search.html" class="active">INVENTORY</a>
            <a href="report.html">REPORT</a>
            <a href="dashboard.html">DASHBOARD</a>
        </div>
    </nav>

    <div class="top-bar">
        <input
            type="text"
            id="searchInput"
            class="search-box"
            placeholder="Search by name, location or date..."
            oninput="loadItems()"
        >
    </div>

    <div class="results-grid" id="results"></div>

    <script>
        async function loadItems() {
            const search = document.getElementById('searchInput').value.trim();
            let url = '/api/items';

            if (search) {
                url += '?search=' + encodeURIComponent(search);
            }

            try {
                const res = await fetch(url);
                const items = await res.json();
                const results = document.getElementById('results');

                if (!items.length) {
                    results.innerHTML = '<div class="empty">No items found.</div>';
                    return;
                }

                results.innerHTML = items.map(item => `
                    <div class="card">
                        ${
                            item.image
                                ? `<img src="${item.image}" alt="${item.name}">`
                                : `<div class="no-image">No Image</div>`
                        }
                        <div class="card-content">
                            <h3>${item.name}</h3>
                            <p>📍 ${item.location}</p>
                            <p>📅 ${item.date || "N/A"}</p>
                            <p>📧 ${
                                item.email
                                    ? `<a href="mailto:${item.email}">${item.email}</a>`
                                    : 'Not provided'
                            }</p>
                            <span class="badge ${item.type}">${item.type.toUpperCase()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
                document.getElementById('results').innerHTML =
                    '<div class="empty">Failed to load items.</div>';
            }
        }

        window.onload = loadItems;
    </script>

</body>
</html>
