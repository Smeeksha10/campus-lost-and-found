<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Findora</title>
    <style>
      :root {
    --primary: #b08968;      /* soft brown */
    --bg: #f8f5f2;           /* warm white */
    --card: #ffffff;
    --text-main: #2c2c2c;
    --text-muted: #8a817c;
}
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f8f5f2;

    display: flex;
    justify-content: center;   /* horizontal center */
    align-items: center;       /* vertical center */
    height: 100vh;             /* full screen height */
}

        .login-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-bottom: 0.5rem; color: var(--text-main); }
        p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            background: var(--input-bg);
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .footer-link {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <span style="font-size: 3rem;">🔐</span>
        <h2>Welcome Back</h2>
        <p>Log in to manage your reported items.</p>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-login" onclick="handleLogin()">Log In</button>

        <div class="footer-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
            <br><br>
            <a href="index.html" style="color: #94a3b8;">← Back to Home</a>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
    
            if (!username || !password) {
                alert("Please fill in all fields");
                return;
            }
    
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
    
            const data = await response.json();
    
            if (response.ok) {
                localStorage.setItem("user", JSON.stringify(data.user));
                alert("Login successful!");
                window.location.href = "index.html";
            } else {
                alert("Login failed: " + data.message);
            }
        }
    </script>

</body>
</html>
